name = "payper-trails-reminders"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Runs daily at 06:00 UTC (~08:00 SAST)
[triggers]
crons = ["0 6 * * *"]

# Secrets (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, RESEND_API_KEY, REMINDER_FROM_EMAIL)
# are NOT set here — set them via `wrangler secret put <NAME>` so they never end up in source control.
